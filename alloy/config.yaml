name: Grafana Alloy
version: "1.1.0"
slug: alloy
description: >-
  Ship Home Assistant logs to Loki using Grafana Alloy.
  Replacement for the deprecated Promtail add-on.
  Reads systemd journal and forwards to a remote Loki instance.
url: https://github.com/hlinden-fmplast/ha-addon-alloy
codeowners:
  - "@ecohash-co"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
journald: true
map:
  - addon_config:rw
  - ssl:ro
ports:
  12345/tcp: 12345
ports_description:
  12345/tcp: "Alloy debug UI"
watchdog: "http://[HOST]:[PORT:12345]/-/ready"
options:
  loki_url: "http://localhost:3100/loki/api/v1/push"
  log_level: info
schema:
  loki_url: url
  log_level: "list(debug|info|warn|error)"
  additional_config: "str?"
  basic_auth_user: "str?"
  basic_auth_password: "password?"
  tls_ca_cert: "str?"
  tls_client_cert: "str?"
  tls_client_key: "str?"
  tls_server_name: "str?"
stage: experimental
apparmor: false
